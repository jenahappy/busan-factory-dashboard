name: 분기별 공장등록현황 자동 업데이트

on:
  schedule:
    - cron: '0 1 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests chardet
      - run: python scripts/fetch_and_build.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --staged --quiet || git commit -m "데이터 자동 업데이트: $(date +'%Y-%m-%d')"
          git push
